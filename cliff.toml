[changelog]
header = ""
body = """
{%- for group, commits in commits | group_by(attribute="group") -%}
{%- set breaking = commits | filter(attribute="breaking", value=true) -%}
{%- if breaking | length > 0 %}

### ⚠️ Breaking Changes

{% for commit in breaking -%}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message }}
{% endfor -%}
{%- endif -%}

{%- set non_breaking = commits | filter(attribute="breaking", value=false) -%}
{%- if non_breaking | length > 0 %}

### {{ group }}

{% for commit in non_breaking -%}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message }}
{% endfor -%}
{%- endif -%}
{%- endfor -%}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"

commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^perf", group = "Performance" },
    { message = "^docs", skip = true },
    { message = "^chore", skip = true },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^ci", skip = true },
]
